version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: outloox-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: outloox
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: outloox
      MYSQL_PASSWORD: outlooxpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: outloox-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 9090
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: outloox
      DB_USERNAME: outloox
      DB_PASSWORD: outlooxpassword
      APP_FRONTEND_URL: http://localhost:8080
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080
      APP_COOKIE_SECURE: false
      APP_COOKIE_SAME_SITE: Lax
      JWT_SECRET: change-this-to-a-very-long-random-production-secret
      RAZORPAY_KEY_ID: your_razorpay_key_id
      RAZORPAY_KEY_SECRET: your_razorpay_key_secret
      RAZORPAY_WEBHOOK_SECRET: your_razorpay_webhook_secret
      CLOUDINARY_CLOUD_NAME: your_cloud_name
      CLOUDINARY_API_KEY: your_cloudinary_api_key
      CLOUDINARY_API_SECRET: your_cloudinary_api_secret
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USERNAME: your_email@example.com
      EMAIL_PASSWORD: your_app_password
    ports:
      - "9090:9090"

  frontend:
    build:
      context: ./frontend
    container_name: outloox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
